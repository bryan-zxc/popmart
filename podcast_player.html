<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast: Agentic Productivity Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #fff;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1.5rem;
        }

        .player-bar {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            position: sticky;
            top: 0;
            z-index: 10;
            border: 1px solid #2a2a2a;
        }

        .player-bar audio {
            width: 100%;
            height: 40px;
            outline: none;
        }

        .transcript {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .segment {
            padding: 1rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.45;
            border-left: 3px solid transparent;
        }

        .segment:hover {
            background: #1a1a1a;
            opacity: 0.7;
        }

        .segment.active {
            opacity: 1;
            background: #1a1a1a;
        }

        .segment.active[data-speaker="Tom"] {
            border-left-color: #5b9bf5;
        }

        .segment.active[data-speaker="Bryan"] {
            border-left-color: #86efac;
        }

        .speaker {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        .segment[data-speaker="Tom"] .speaker { color: #5b9bf5; }
        .segment[data-speaker="Bryan"] .speaker { color: #86efac; }

        .text {
            font-size: 0.95rem;
            line-height: 1.65;
            color: #ccc;
        }

        .segment.active .text {
            color: #f0f0f0;
        }

        .timestamp {
            font-size: 0.7rem;
            color: #555;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agentic Productivity Tools</h1>
        <p class="subtitle">Tom &amp; Bryan discuss how AI is reshaping professional services</p>

        <div class="player-bar">
            <audio id="audio" controls preload="auto">
                <source src="podcast_output.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="transcript" id="transcript"></div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const transcriptEl = document.getElementById('transcript');

        const cues = [
            { start: 0.000, end: 5.616, speaker: "Tom", text: "So Bryan, what is an agentic productivity tool, and how is that different to something like ChatGPT?" },
            { start: 6.416, end: 56.984, speaker: "Bryan", text: "So a traditional chatbot like ChatGPT is essentially a really smart conversation partner \u2014 you ask it something, it gives you an answer, you ask a follow-up, it responds again. It\u2019s reactive. You\u2019re driving the whole time. An agentic productivity tool flips that on its head. Instead of just answering questions, it can actually do things. You give it a goal \u2014 like \u201Canalyse these expenses and flag anything unusual\u201D or \u201Cbuild me a presentation pack for the board meeting\u201D \u2014 and it goes off, breaks that down into steps, uses tools, reads files, writes content, searches the web, and comes back with the finished result. The key difference is autonomy. ChatGPT is like texting a really knowledgeable mate. An agentic tool is more like handing a task to a junior colleague who can actually open your files, crunch the numbers, and submit the work. It\u2019s the difference between getting advice and getting things done." },
            { start: 57.784, end: 63.208, speaker: "Tom", text: "What do you think is the impact of AI to the world, especially how it impacts us in professional services?" },
            { start: 64.008, end: 136.944, speaker: "Bryan", text: "That\u2019s a big one. I think the impact is going to be massive, and honestly, we\u2019re only at the very beginning of it. The way I see it, what\u2019s happening right now with AI is a revolution on the same scale as the industrial revolution or the dot com boom. Think about it this way \u2014 this is like when people were writing debits and credits on paper, and then one day someone walked into the room with a computer. It\u2019s really difficult to come to grips with what it is, how to use it, and what\u2019s even possible. But the computer is here. You either figure out how to use it, or you become obsolete. Now, that might sound scary, but the reality is \u2014 we live in an era that is post machines taking over the world, post computers taking over the world, post the world wide web taking over the world. And do we have no jobs left? No. Professional services at the end of the day is about solving problems. Sure, some problems become obsolete because of AI, but AI is also creating a whole plethora of new problems and opportunities that were never imagined before. We continue to be useful problem solvers, but the entire foundation of how we solve problems needs to be reimagined and re-understood. The dangerous thing to do is to grasp onto the pen and hope that computers won\u2019t become common before you retire \u2014 especially when AI is changing the world on an annual basis, sometimes multiple times a year. That\u2019s not a bet you want to make." },
            { start: 137.744, end: 152.888, speaker: "Tom", text: "If I think about the stack that I use \u2014 Outlook, SQL, PowerPoint, ChatGPT, Word, Python, Excel, Power BI, Tableau \u2014 how will agentic productivity tools change the average analyst\u2019s day?" },
            { start: 153.688, end: 261.856, speaker: "Bryan", text: "The first mistake is to think this only impacts analysts. The impact is from grad to partner, and it doesn\u2019t get smaller as the rank gets higher. I estimate that ninety percent of your day to day will be reformed at every level, without exception. Why do I say this? The productivity difference between using AI and not is measured on a Richter scale. It is so overpowering that as soon as we start using it, we will start making decisions around the tool \u2014 this including our fundamental ways of working alongside our entire tool ecosystem. Everything will be reimagined and redesigned. Starting from the things that are familiar \u2014 we will largely start divorcing ourselves from the Microsoft stack. Word will be replaced with markdown files. PowerPoint will be replaced with HTML files. Excel will be replaced with parquets, CSVs, JSON, HTML. Power BI and Tableau will be replaced by Python or JavaScript libraries. Outlook won\u2019t go, but the way we interact with Outlook will be quite different. AI will connect to your mailbox and take care of housekeeping activities, assist you with response drafting, and more importantly, collate information in a discoverable form in your project repo. And taking a step beyond that \u2014 immediately change your analysis code based on client responses to data questions. Within about ten minutes your entire analysis outcome from end to end, including your presentation pack, is updated. And the change doesn\u2019t end there. Imagine if doing your timesheets is just saying \u201Cdo my timesheets.\u201D Imagine if daily stand-ups become obsolete because anyone can ask at any time what the team\u2019s progress is and get an answer that allows you to dig to incredibly high levels of detail if required \u2014 without needing any human to reply in the process. And all of this that I\u2019m saying is not coming in a year\u2019s time, not coming in six months, but something I can show next week in a personal project I\u2019ve squeezed out of my spare time in the past two weeks." },
            { start: 262.656, end: 266.592, speaker: "Tom", text: "How can people best come up to speed and start their journey with these productivity tools?" },
            { start: 267.391, end: 316.567, speaker: "Bryan", text: "Good news \u2014 we have managed to wire up Claude Code with our Deloitte LLM gateway. We are currently going through the final steps of our due diligence process to be able to use it on client engagements under guidelines. Having said that, we already have eight early adopters who have installed Claude Code and are using it for non-client use cases. If you\u2019re interested, message me on Teams and I\u2019ll add you to the group. If you can wait about a week, you probably won\u2019t need to go through the complex installation and setup process at all \u2014 we will probably have a first-cut Docker image with everything already set up and installed. Once the tool is available, the key is just to start using it and experiencing it for yourself. The entry barrier is incredibly low. In particular, try the skills the team has already built and familiarise yourself with that feature \u2014 it will be quite a critical and prominent feature in our ways of working evolution." },
        ];

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function renderTranscript() {
            transcriptEl.innerHTML = '';
            cues.forEach((cue, i) => {
                const div = document.createElement('div');
                div.className = 'segment';
                div.dataset.speaker = cue.speaker;
                div.dataset.index = i;
                div.innerHTML = `
                    <div class="speaker">${cue.speaker}</div>
                    <div class="text">${cue.text}</div>
                    <div class="timestamp">${formatTime(cue.start)} \u2013 ${formatTime(cue.end)}</div>
                `;
                div.addEventListener('click', () => {
                    audio.currentTime = cue.start;
                    audio.play();
                });
                transcriptEl.appendChild(div);
            });
        }

        function updateActive() {
            const t = audio.currentTime;
            const segments = transcriptEl.querySelectorAll('.segment');
            let activeIdx = -1;

            cues.forEach((cue, i) => {
                if (t >= cue.start && t < cue.end) activeIdx = i;
            });

            segments.forEach((seg, i) => {
                seg.classList.toggle('active', i === activeIdx);
            });

            if (activeIdx >= 0) {
                segments[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        renderTranscript();
        audio.addEventListener('timeupdate', updateActive);
    </script>
</body>
</html>
